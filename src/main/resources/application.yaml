spring:
  application:
    name: demo

  docker:
    compose:
      enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5433/demo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

app:
  datasource:
    mode: rest

  data-service:
    url: ${DATA_SERVICE_URL:http://localhost:8081}
