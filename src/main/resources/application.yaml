spring:
  application:
    name: demo

  docker:
    compose:
      enabled: true
      lifecycle-management: start-and-stop
      stop:
        command: down

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5433/demo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

# -------------------------------------------------------------------
# Data source mode:
#   jpa  (default) — acceso directo a PostgreSQL vía JPA/Hibernate
#   rest           — delega todas las operaciones al servicio de datos
# -------------------------------------------------------------------
app:
  datasource:
    mode: jpa

  # URL base del servicio de datos remoto (sólo se usa cuando mode=rest)
  data-service:
    url: ${DATA_SERVICE_URL:http://localhost:8081}
