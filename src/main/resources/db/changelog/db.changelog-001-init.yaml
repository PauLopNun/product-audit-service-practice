databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: pau
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
        - createIndex:
            indexName: idx_users_name
            tableName: users
            columns:
              - column:
                  name: name

  - changeSet:
      id: 002-create-allergy
      author: pau
      changes:
        - createTable:
            tableName: allergy
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: severity
                  type: VARCHAR(255)

  - changeSet:
      id: 003-create-user-allergy
      author: pau
      changes:
        - createTable:
            tableName: user_allergy
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: allergy_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_allergy
            columnNames: user_id, allergy_id
            constraintName: pk_user_allergy
        - addForeignKeyConstraint:
            baseTableName: user_allergy
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_allergy_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_allergy
            baseColumnNames: allergy_id
            referencedTableName: allergy
            referencedColumnNames: id
            constraintName: fk_user_allergy_allergy
            onDelete: CASCADE
        - createIndex:
            indexName: idx_user_allergy_user_id
            tableName: user_allergy
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_user_allergy_allergy_id
            tableName: user_allergy
            columns:
              - column:
                  name: allergy_id

