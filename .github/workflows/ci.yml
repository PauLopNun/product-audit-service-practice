name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build (skip tests - requires data-service running)
        run: ./mvnw package -DskipTests -Dspring.docker.compose.enabled=false

      - name: Build Docker image
        run: docker build -t audit-service:ci .
